<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stumble Guys Player Overlay</title>
    <style>
        /* Modern Gaming Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #ffffff;
            padding-top: 10vh;
        }

        /* Search Section */
        .search-container {
            width: 90%;
            max-width: 400px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #38bdf8;
        }

        button {
            padding: 0 25px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        /* The Overlay Card (Glassmorphism) */
        .overlay-card {
            width: 90%;
            max-width: 400px;
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            box-sizing: border-box;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            
            /* Animation for popping up */
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.4s ease-out;
            pointer-events: none;
        }

        .overlay-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Player Header (Skin + Name + Rank) */
        .player-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .skin-img {
            width: 90px;
            height: 90px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .player-info h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }

        .rank-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #cbd5e1;
            width: fit-content;
        }

        .rank-badge img {
            width: 20px;
            height: 20px;
        }

        /* Stats Grid */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-box p {
            margin: 0 0 5px 0;
            color: #94a3b8;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-box span {
            font-size: 22px;
            font-weight: bold;
            color: #f8fafc;
        }

        /* Loading & Error States */
        .status-message {
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #94a3b8;
        }
        
        .error-text {
            color: #ef4444;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Search Bar -->
    <div class="search-container">
        <input type="text" id="usernameInput" placeholder="Search Stumble Guys Player...">
        <button id="searchBtn">🔍</button>
    </div>

    <!-- Status / Loading Message -->
    <div id="statusMsg" class="status-message hidden">Searching...</div>

    <!-- Player Overlay Card -->
    <div id="playerCard" class="overlay-card">
        
        <div class="player-header">
            <img id="playerSkin" class="skin-img" src="" alt="Skin">
            <div class="player-info">
                <h2 id="playerName">PlayerName</h2>
                <div class="rank-badge">
                    <img id="rankIcon" src="" alt="Rank">
                    <span id="playerRank">Grandmaster</span>
                </div>
            </div>
        </div>

        <div class="stats-container">
            <div class="stat-box">
                <p>👑 Crowns</p>
                <span id="playerCrowns">0</span>
            </div>
            <div class="stat-box">
                <p>🏆 Trophies</p>
                <span id="playerTrophies">0</span>
            </div>
        </div>

    </div>

    <script>
        // --- PASTE YOUR API KEY HERE ---
        const API_KEY = 'YOUR_API_KEY_HERE'; 

        const searchBtn = document.getElementById('searchBtn');
        const usernameInput = document.getElementById('usernameInput');
        const playerCard = document.getElementById('playerCard');
        const statusMsg = document.getElementById('statusMsg');

        // Card Elements
        const playerNameDisplay = document.getElementById('playerName');
        const playerRankDisplay = document.getElementById('playerRank');
        const playerCrownsDisplay = document.getElementById('playerCrowns');
        const playerTrophiesDisplay = document.getElementById('playerTrophies');
        const playerSkinDisplay = document.getElementById('playerSkin');
        const rankIconDisplay = document.getElementById('rankIcon');

        searchBtn.addEventListener('click', performSearch);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const username = usernameInput.value.trim();
            if (!username) return;

            // Reset UI
            playerCard.classList.remove('visible');
            statusMsg.textContent = 'Searching database...';
            statusMsg.classList.remove('hidden', 'error-text');

            try {
                const response = await fetch('https://api.stumblelabs.net/api/live/users/search', {
                    method: 'POST',
                    headers: {
                        'x-api-key': API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: username })
                });

                if (!response.ok) throw new Error(`Server Status ${response.status}`);

                const resData = await response.json();

                if (resData && resData.success && resData.data) {
                    const player = resData.data;
                    
                    // Clean Username (Removes Hex Color Codes)
                    const cleanName = player.userName ? player.userName.replace(/<#.*?>/g, '') : username;
                    
                    // Populate Data
                    playerNameDisplay.textContent = cleanName;
                    playerCrownsDisplay.textContent = (player.crowns || 0).toLocaleString();
                    playerTrophiesDisplay.textContent = (player.trophies || 0).toLocaleString();
                    playerRankDisplay.textContent = player.ranked?.name || 'Unranked';
                    
                    // Populate Images
                    playerSkinDisplay.src = player.skinIcon || '';
                    playerSkinDisplay.style.display = player.skinIcon ? 'block' : 'none';
                    
                    rankIconDisplay.src = player.ranked?.icon || '';
                    rankIconDisplay.style.display = player.ranked?.icon ? 'block' : 'none';

                    // Hide status and trigger overlay animation
                    statusMsg.classList.add('hidden');
                    playerCard.classList.add('visible');

                } else {
                    throw new Error(resData.message || 'Player not found in database.');
                }

            } catch (error) {
                console.error(error);
                statusMsg.classList.add('error-text');
                
                if (error.message.includes('Failed to fetch')) {
                    statusMsg.textContent = 'Connection Blocked. Check API Key or CORS.';
                } else {
                    statusMsg.textContent = error.message || 'Failed to fetch player.';
                }
            }
        }
    </script>
</body>
</html>
